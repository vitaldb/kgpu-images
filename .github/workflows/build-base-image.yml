name: build-base-image

# Build & push the kgpu-pytorch base image to ghcr.io as a multi-arch
# manifest (arm64 + amd64). Each arch builds natively on its own GitHub
# Actions runner (much faster than QEMU emulation), then a manifest list
# is created so a single `:latest` tag works on both GB10 (arm64) and
# KHDP A5000/A6000 (amd64) workers.
#
# Triggers: any change to the Dockerfile, helper scripts, or this
# workflow, plus manual dispatch.

on:
  push:
    paths:
      - "kgpu-pytorch.Dockerfile"
      - "kgpu-mount-shared"
      - "kgpu-mount-files"
      - "kgpu-bootstrap"
      - ".github/workflows/build-base-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/vitaldb/kgpu-pytorch

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            arch: arm64
          - runner: ubuntu-24.04
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push (digest-only)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: kgpu-pytorch.Dockerfile
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.arch }}
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:24.10-py3 \
            $(printf "${{ env.IMAGE }}@sha256:%s " *)
      - name: Verify
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:latest
